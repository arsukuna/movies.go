<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Watch It List</title>
  <style>
    body {
      background:#0b0b0f;
      color:#fff;
      font-family: Arial, sans-serif;
      margin:0;
    }

    /* NAVBAR */
    .navbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 22px;
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(10,10,15,0.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size:22px;
      font-weight:800;
      color:#e50914;
      letter-spacing:1px;
    }
    .nav-links {
      display:flex;
      align-items:center;
    }
    .nav-links a, .nav-links select {
      color:#ddd;
      margin:0 10px;
      text-decoration:none;
      font-size:14px;
      transition:0.2s;
    }
    .nav-links a:hover {
      color:#e50914;
    }

    /* زر المكتبة */
    .library-btn {
      display:inline-block;
      padding:10px 18px;
      background:#1e90ff;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-weight:bold;
      transition:0.3s;
      box-shadow:0 4px 10px rgba(0,0,0,0.4);
    }
    .library-btn:hover {
      background:#0066cc;
    }

    /* Dropdown التصنيفات */
    .dropdown {
      position:relative;
      display:inline-block;
    }
    .dropdown-content {
      display:none;
      position:absolute;
      background:#222;
      min-width:140px;
      box-shadow:0 4px 8px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:20;
    }
    .dropdown-content a {
      color:#fff;
      padding:10px;
      text-decoration:none;
      display:block;
      transition:0.2s;
    }
    .dropdown-content a:hover {
      background:#e50914;
    }
    .dropdown:hover .dropdown-content {
      display:block;
    }

    /* Landing Page */
    .landing {
      text-align:center;
      padding:60px 20px;
      background:url('background.jpg') no-repeat center center/cover;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }
    .landing h1 {
      font-size:32px;
      color:#e50914;
      margin-bottom:20px;
      text-shadow:0 2px 6px rgba(0,0,0,0.7);
    }

    /* Library */
    .library {
      padding:40px 20px;
      text-align:center;
      background:#0b0b0f;
    }
    .library h1 {
      color:#e50914;
      margin-bottom:40px;
    }
    .sections {
      display:flex;
      justify-content:space-around;
      flex-wrap:wrap;
    }
    .section {
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:8px;
      width:250px;
      margin:15px;
      text-align:center;
      transition:0.3s;
    }
    .section:hover {
      background:rgba(255,255,255,0.15);
    }
    .section h2 {
      margin-bottom:15px;
      color:#fff;
    }
    .section a {
      display:inline-block;
      padding:10px 15px;
      background:#e50914;
      color:#fff;
      text-decoration:none;
      border-radius:4px;
      transition:0.3s;
    }
    .section a:hover {
      background:#b20710;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo" id="logo">Watch It List</div>
    <div class="nav-links">
      <a href="#landing" id="home">الرئيسية</a>
      <a href="#anime" id="animeLink">أنمي</a>
      <a href="#movies" id="moviesLink">أفلام</a>
      <a href="#series" id="seriesLink">مسلسلات</a>
      <a href="#library" class="library-btn" id="libraryBtn">ادخل للمكتبة</a>

      <!-- Dropdown التصنيفات -->
      <div class="dropdown">
        <a href="#" id="categories">التصنيفات ▾</a>
        <div class="dropdown-content">
          <a href="#">رعب</a>
          <a href="#">كوميديا</a>
          <a href="#">أكشن</a>
          <a href="#">خيال</a>
          <a href="#">رومانسي</a>
        </div>
      </div>

      <!-- اختيار اللغة -->
      <select id="lang">
        <option value="ar">العربية</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>
  </div>

  <!-- Landing Page -->
  <div class="landing" id="landing">
    <h1 id="welcome">مرحبًا بك في Watch It List</h1>
  </div>

  <!-- Library -->
  <div class="library" id="library">
    <h1 id="libraryTitle">المكتبة</h1>
    <div class="sections">
      <div class="section" id="anime">
        <h2 id="animeSection">قسم الأنمي</h2>
        <a href="#">ادخل</a>
      </div>
      <div class="section" id="movies">
        <h2 id="moviesSection">قسم الأفلام</h2>
        <a href="#">ادخل</a>
      </div>
      <div class="section" id="series">
        <h2 id="seriesSection">قسم المسلسلات</h2>
        <a href="#">ادخل</a>
      </div>
    </div>
  </div>

  <!-- JavaScript لتغيير اللغة -->
  <script>
    const translations = {
      ar: {
        home: "الرئيسية",
        anime: "أنمي",
        movies: "أفلام",
        series: "مسلسلات",
        libraryBtn: "ادخل للمكتبة",
        categories: "التصنيفات ▾",
        welcome: "مرحبًا بك في Watch It List",
        libraryTitle: "المكتبة",
        animeSection: "قسم الأنمي",
        moviesSection: "قسم الأفلام",
        seriesSection: "قسم المسلسلات"
      },
      en: {
        home: "Home",
        anime: "Anime",
        movies: "Movies",
        series: "Series",
        libraryBtn: "Enter Library",
        categories: "Categories ▾",
        welcome: "Welcome to Watch It List",
        libraryTitle: "Library",
        animeSection: "Anime Section",
        moviesSection: "Movies Section",
        seriesSection: "Series Section"
      },
      fr: {
        home: "Accueil",
        anime: "Anime",
        movies: "Films",
        series: "Séries",
        libraryBtn: "Entrer la bibliothèque",
        categories: "Catégories ▾",
        welcome: "Bienvenue à Watch It List",
        libraryTitle: "Bibliothèque",
        animeSection: "Section Anime",
        moviesSection: "Section Films",
        seriesSection: "Section Séries"
      }
    };

    document.getElementById("lang").addEventListener("change", function() {
      const lang = this.value;
      const t = translations[lang];
      document.getElementById("home").textContent = t.home;
      document.getElementById("animeLink").textContent = t.anime;
      document.getElementById("moviesLink").textContent = t.movies;
      document.getElementById("seriesLink").textContent = t.series;
      document.getElementById("libraryBtn").textContent = t.libraryBtn;
      document.getElementById("categories").textContent = t.categories;
      document.getElementById("welcome").textContent = t.welcome;
      document.getElementById("libraryTitle").textContent = t.libraryTitle;
      document.getElementById("animeSection").textContent = t.animeSection;
      document.getElementById("moviesSection").textContent = t.moviesSection;
      document.getElementById("seriesSection").textContent = t.seriesSection;
    });
  </script>

</body>
</html>
