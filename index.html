<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamFlix Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">STREAMFLIX</div>
    <div class="nav-links">
      <button onclick="showAll()"><span data-lang="home">Home</span></button>
      <button onclick="filterType('movie')"><span data-lang="movies">Movies</span></button>
      <button onclick="filterType('series')"><span data-lang="series">Series</span></button>
      <button onclick="filterType('anime')"><span data-lang="anime">Anime</span></button>
      <button onclick="openFavorites()"><span data-lang="favorites">Favorites</span></button>
    </div>
    <input class="search" placeholder="Search...">
    <button class="lang-toggle" onclick="toggleLang()">🌐</button>
    <button class="login-btn" onclick="openLogin()">Login</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1 data-lang="hero">Watch Movies, Series & Anime</h1>
  </div>

  <!-- GRID -->
  <div class="section">
    <div class="grid" id="grid"></div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2 data-lang="login">Login</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Submit</button>
      <button onclick="closeLogin()">Close</button>
    </div>
  </div>

  <!-- DETAILS MODAL -->
  <div id="detailsModal" class="modal"></div>

  <script src="script.js"></script>
</body>
</html>
