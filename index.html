<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WatchHub V2</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* ===== NAVBAR ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#111;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:red;
font-weight:bold;
font-size:22px;
}

.nav-links button{
background:none;
border:none;
color:white;
margin:0 5px;
cursor:pointer;
}

.search{
padding:6px;
border-radius:5px;
border:none;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:scale(1.05);}
.card img{width:100%;height:220px;object-fit:cover}

/* ===== HERO ===== */
.hero{
padding:30px;
background:linear-gradient(to right,#000,#300);
font-size:28px;
}

/* ===== LOGIN MODAL ===== */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:20px;
border-radius:10px;
width:250px;
}

input{
width:100%;
margin:5px 0;
padding:8px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">WATCHHUB</div>

<div class="nav-links">
<button onclick="filter('all')">Home</button>
<button onclick="filter('movie')">Movies</button>
<button onclick="filter('series')">Series</button>
<button onclick="filter('anime')">Anime</button>
</div>

<input class="search" placeholder="Search...">

<div>
<button onclick="openLogin()">Login</button>
<button onclick="openRegister()">Sign Up</button>
<button onclick="toggleLang()">🌐</button>
</div>
</div>

<!-- HERO -->
<div class="hero" id="heroText">
Watch Movies, Series & Anime
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-box">
<h3>Login</h3>
<input id="loginUser" placeholder="Username">
<input id="loginPass" placeholder="Password" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- REGISTER -->
<div class="modal" id="registerModal">
<div class="modal-box">
<h3>Sign Up</h3>
<input id="regUser" placeholder="Username">
<input id="regPass" placeholder="Password" type="password">
<button onclick="register()">Create</button>
</div>
</div>
<script>

/* ===================== USERS (localStorage) ===================== */
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser") || null;

/* ===================== LANGUAGE ===================== */
let lang = "en";

const texts = {
en:{
home:"Home",
movies:"Movies",
series:"Series",
anime:"Anime",
login:"Login",
signup:"Sign Up",
search:"Search...",
hero:"Watch Movies, Series & Anime"
},
ar:{
home:"الرئيسية",
movies:"الأفلام",
series:"المسلسلات",
anime:"الأنمي",
login:"تسجيل الدخول",
signup:"إنشاء حساب",
search:"بحث...",
hero:"شاهد الأفلام والمسلسلات والأنمي"
}
};

/* ===================== DATA (60 ITEMS SIMPLIFIED SAMPLE) ===================== */
const data = [
{title:"Inception",type:"movie",image:"https://image.tmdb.org/t/p/w500/8h58xC1.jpg",video:"https://www.youtube.com/embed/YoHD9XEInc0"},
{title:"The Dark Knight",type:"movie",image:"https://image.tmdb.org/t/p/w500/qJ2tW6.jpg",video:"https://www.youtube.com/embed/EXeTwQWrcwY"},
{title:"Interstellar",type:"movie",image:"https://image.tmdb.org/t/p/w500/rAi.jpg",video:"https://www.youtube.com/embed/zSWdZVtXT7E"},
{title:"Breaking Bad",type:"series",image:"https://image.tmdb.org/t/p/w500/ggF.jpg",video:"https://www.youtube.com/embed/HhesaQXLuRY"},
{title:"Money Heist",type:"series",image:"https://image.tmdb.org/t/p/w500/Mc.jpg",video:"https://www.youtube.com/embed/hMANIarjT50"},
{title:"Attack on Titan",type:"anime",image:"https://image.tmdb.org/t/p/w500/h.jpg",video:"https://www.youtube.com/embed/MGRm4IzK1SQ"}
];

/* ===================== FAVORITES ===================== */
let fav = JSON.parse(localStorage.getItem("fav_"+currentUser)) || [];

function toggleFav(title){
if(!currentUser){alert("Login first");return;}

if(fav.includes(title)){
fav = fav.filter(f=>f!==title);
}else{
fav.push(title);
}

localStorage.setItem("fav_"+currentUser, JSON.stringify(fav));
alert("Updated Favorites ❤️");
}

/* ===================== DISPLAY ===================== */
const grid = document.getElementById("grid");

function show(list){
grid.innerHTML = "";

list.forEach(item=>{
grid.innerHTML += `
<div class="card">
<img src="${item.image}" onclick="openVideo('${item.video}')">
<div style="padding:8px">
<h4>${item.title}</h4>

<button onclick="toggleFav('${item.title}')">❤️</button>
</div>
</div>
`;
});
}

show(data);

/* ===================== FILTER ===================== */
function filter(type){
if(type==="all") show(data);
else show(data.filter(i=>i.type===type));
}

/* ===================== SEARCH ===================== */
document.querySelector(".search").addEventListener("input",(e)=>{
let val = e.target.value.toLowerCase();
show(data.filter(i=>i.title.toLowerCase().includes(val)));
});

/* ===================== VIDEO ===================== */
function openVideo(video){
let box = document.createElement("div");
box.style = `
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
`;

box.innerHTML = `
<div style="width:80%;height:80%">
<iframe width="100%" height="100%" src="${video}" frameborder="0" allowfullscreen></iframe>
<button onclick="this.parentElement.parentElement.remove()"
style="position:absolute;top:20px;right:20px;padding:10px;background:red;color:white;border:none">
Close
</button>
</div>
`;

document.body.appendChild(box);
}

/* ===================== LOGIN ===================== */
function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function openRegister(){
document.getElementById("registerModal").style.display="flex";
}

function register(){
let u=document.getElementById("regUser").value;
let p=document.getElementById("regPass").value;

users[u]=p;
localStorage.setItem("users",JSON.stringify(users));

alert("Account created!");
}

function login(){
let u=document.getElementById("loginUser").value;
let p=document.getElementById("loginPass").value;

if(users[u] && users[u]===p){
currentUser=u;
localStorage.setItem("currentUser",u);
fav = JSON.parse(localStorage.getItem("fav_"+u)) || [];
alert("Welcome "+u);
}else{
alert("Wrong data");
}
}

/* ===================== LANGUAGE ===================== */
function toggleLang(){
lang = lang==="en"?"ar":"en";

document.querySelector(".logo").innerText="WATCHHUB";
document.querySelector(".search").placeholder=texts[lang].search;
document.getElementById("heroText").innerText=texts[lang].hero;
}

/* ===================== CLOSE MODALS ===================== */
window.onclick=function(e){
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
}

</script>

</body>
</html>
