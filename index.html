<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamFlix</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* ===== NAVBAR ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#111;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:red;
font-size:22px;
font-weight:bold;
}

.nav-left, .nav-right{
display:flex;
align-items:center;
gap:10px;
}

.nav-left button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:14px;
}

.search{
padding:6px;
border-radius:5px;
border:none;
}

/* ===== HERO SLIDER ===== */
.hero{
height:350px;
background:url("https://image.tmdb.org/t/p/original/9PK6k.jpg") center/cover;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(to right,rgba(0,0,0,0.8),transparent);
}

.hero h1{
position:relative;
font-size:40px;
}

/* ===== SECTIONS ===== */
.section{
padding:20px;
}

.section h2{
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

/* ===== CARD ===== */
.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="nav-left">
<div class="logo">STREAMFLIX</div>

<button onclick="showAll()">Home</button>
<button onclick="filterType('movie')">Movies</button>
<button onclick="filterType('series')">Series</button>
<button onclick="filterType('anime')">Anime</button>
</div>

<div class="nav-right">
<input class="search" placeholder="Search...">
</div>

</div>

<!-- HERO -->
<div class="hero">
<h1>Unlimited Movies, Series & Anime</h1>
</div>

<!-- CONTENT -->
<div class="section">
<h2>Trending Now</h2>
<div class="grid" id="grid"></div>
</div>
<script>

const data = [

},

/* ================= SERIES (20) ================= */
{

{

desc:"Biggest heist plan in history.",

},
{

rating:8.7,

/* ================= ANIME (20) ================= */
{
title:"Attack on Titan",
type:"anime",

},
{

rating:8.7,

},

<script>

const grid = document.getElementById("grid");

/* ===== DISPLAY ===== */
function show(list){
grid.innerHTML = "";

list.forEach(item=>{
grid.innerHTML += `
<div class="card" onclick="openVideo('${item.video}')">
<img src="${item.img}">
<div style="padding:8px">
<h4>${item.title}</h4>
<small>${item.year} | ⭐ ${item.rating}</small>
</div>
</div>
`;
});
}

show(data);

/* ===== FILTER ===== */
function filterType(type){
show(data.filter(i=>i.type === type));
}

function showAll(){
show(data);
}

/* ===== SEARCH ===== */
document.querySelector(".search").addEventListener("input",(e)=>{
let val = e.target.value.toLowerCase();
let filtered = data.filter(i =>
i.title.toLowerCase().includes(val)
);
show(filtered);
});

/* ===== VIDEO PLAYER ===== */
function openVideo(video){

let box = document.createElement("div");

box.style = `
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
`;

box.innerHTML = `
<div style="width:80%;height:80%">
<iframe width="100%" height="100%"
src="${video}"
frameborder="0"
allowfullscreen></iframe>

<button onclick="this.parentElement.parentElement.remove()"
style="position:absolute;top:20px;right:20px;
padding:10px;background:red;color:white;border:none;cursor:pointer">
Close
</button>
</div>
`;

document.body.appendChild(box);
}

</script>
<style>

/* ===== FIX NAVBAR RESPONSIVE ===== */
.navbar{
flex-wrap:wrap;
gap:10px;
}

.nav-left button{
padding:6px 10px;
border-radius:5px;
transition:0.2s;
}

.nav-left button:hover{
background:red;
}

/* ===== CARD FIX ===== */
.card h4{
margin:5px 0;
font-size:14px;
}

.card small{
color:#aaa;
}

/* ===== SCROLL BAR ===== */
body::-webkit-scrollbar{
width:8px;
}

body::-webkit-scrollbar-thumb{
background:red;
border-radius:10px;
}

/* ===== BUTTON STYLE ===== */
button{
cursor:pointer;
}

/* ===== SEARCH FIX ===== */
.search{
outline:none;
background:#222;
color:white;
}

/* ===== HERO TEXT ===== */
.hero h1{
z-index:1;
}

/* ===== MOBILE ===== */
@media(max-width:600px){
.hero h1{
font-size:24px;
}

.nav-left{
flex-wrap:wrap;
}
}

</style>

</body>
</html>
