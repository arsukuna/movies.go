<!DOCTYPE html>
<html>
<head>
    <title>Watch It List</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; margin: 0; }
        header { background: #222; color: white; padding: 15px; text-align: center; }
        .search-box { margin: 20px; text-align: center; }
        input { padding: 10px; width: 300px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: white; margin: 15px; padding: 15px; width: 220px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card img { width: 100%; border-radius: 5px; }
        .card h2 { font-size: 18px; margin: 10px 0; }
    </style>
    <script>
        function searchAnime() {
            let input = document.getElementById("search").value.toLowerCase();
            let cards = document.getElementsByClassName("card");
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName("h2")[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "block" : "none";
            }
        }
    </script>
</head>
<body>
    <header>
        <h1>Watch It List 🎬</h1>
        <button>تسجيل الدخول / إنشاء حساب</button>
    </header>

    <div class="search-box">
        <input type="text" id="search" onkeyup="searchAnime()" placeholder="ابحث عن أنمي أو فيلم...">
    </div>

    <h2 style="text-align:center;">قسم الأنمي</h2>
    <div class="grid">
        <!-- مثال أول أنمي -->
        <div class="card">
            <img src="attack-on-titan.jpg" alt="هجوم العمالقة">
            <h2>هجوم العمالقة (Attack on Titan)</h2>
            <p>أنمي شهير تدور أحداثه حول صراع البشرية ضد العمالقة.</p>
            <a href="https://www.youtube.com/results?search_query=attack+on+titan+trailer">شاهد المقطع الدعائي</a>
        </div>
    </div>
</body>
</html>
