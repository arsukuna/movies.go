<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Watch It List</title>
  <style>
    /* إعدادات عامة */
    *{margin:0; padding:0; box-sizing:border-box; font-family:system-ui, Arial;}
    body{ background:#0b0b0f; color:#fff; }

    /* NAVBAR */
    .navbar{
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 22px; position:sticky; top:0; z-index:10;
      background:rgba(10,10,15,0.7); backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .logo{ font-size:22px; font-weight:800; color:#e50914; letter-spacing:1px; }
    .nav-links a{ color:#ddd; margin:0 10px; text-decoration:none; font-size:14px; transition:0.2s; }
    .nav-links a:hover{ color:#e50914; }

    /* HERO */
    .hero{
      height:65vh; display:flex; align-items:center; padding:30px; position:relative;
      background:linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.3)),
      url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
    }
    .hero-content{ max-width:600px; animation:fadeIn 1s ease; }
    .hero h1{ font-size:44px; margin-bottom:10px; }
    .hero p{ color:#bbb; margin-bottom:20px; }

    /* قسم الأنمي */
    .anime{ padding:40px; }
    .anime h2{ margin-bottom:20px; font-size:26px; color:#e50914; }

    .card{
      background:rgba(255,255,255,0.05);
      padding:20px; border-radius:8px; margin-bottom:20px;
    }
    .card img.poster{
      width:100%; border-radius:6px; margin-bottom:15px;
    }
    .card h3{ margin-bottom:10px; }
    .card p{ color:#ccc; line-height:1.6; }

    .trailer-btn{
      display:inline-block; margin-top:10px; padding:10px 15px;
      background:#e50914; color:#fff; text-decoration:none;
      border-radius:4px; transition:0.3s;
    }
