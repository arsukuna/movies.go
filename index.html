<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch It</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #111;
}

.logo {
    font-size: 24px;
    color: red;
    font-weight: bold;
}

.search {
    padding: 8px;
    width: 200px;
}

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
}

.card {
    background: #1a1a1a;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.card h3 {
    font-size: 14px;
    padding: 10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">WATCH.IT</div>
    <input type="text" class="search" placeholder="Search...">
</header>

<div class="container">
    <div class="grid" id="movies"></div>
</div>
<script>
const movies = [
    {
        title: "Avengers Endgame",
        category: "movie",
        image: "https://i.imgur.com/3JwZQ.jpg",
        video: "https://www.youtube.com/embed/TcMBFSGVi1c"
    },
    {
        title: "Breaking Bad",
        category: "series",
        image: "https://i.imgur.com/1bX5QH6.jpg",
        video: "https://www.youtube.com/embed/HhesaQXLuRY"
    },
    {
        title: "Attack on Titan",
        category: "anime",
        image: "https://i.imgur.com/z7J9E.jpg",
        video: "https://www.youtube.com/embed/MGRm4IzK1SQ"
    },
    {
        title: "Joker",
        category: "movie",
        image: "https://i.imgur.com/6X4F7.jpg",
        video: "https://www.youtube.com/embed/zAGVQLHvwOY"
    },
    {
        title: "Money Heist",
        category: "series",
        image: "https://i.imgur.com/9gkds.jpg",
        video: "https://www.youtube.com/embed/hMANIarjT50"
    },
    {
        title: "Demon Slayer",
        category: "anime",
        image: "https://i.imgur.com/xv3Rk.jpg",
        video: "https://www.youtube.com/embed/VQGCKyvzIM4"
    }
];
</script>
<script>
const container = document.getElementById("movies");

function displayMovies(list) {
    container.innerHTML = "";
    list.forEach(movie => {
        container.innerHTML += `
            <div class="card" onclick="openPlayer('${movie.video}')">
                <img src="${movie.image}">
                <h3>${movie.title}</h3>
            </div>
        `;
    });
}

displayMovies(movies);

function openPlayer(video) {
    document.getElementById("player").style.display = "flex";
    document.getElementById("videoFrame").src = video;
}

function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("videoFrame").src = "";
}
</script>

<!-- Popup Player -->
<div id="player" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
">

    <div style="position:relative; width:80%; height:80%;">
        <span onclick="closePlayer()" style="
        position:absolute;
        top:-30px;
        right:0;
        font-size:30px;
        cursor:pointer;">✖</span>

        <iframe id="videoFrame" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>

</div>
<style>
.filters {
    margin: 15px;
}

.filters button {
    margin-right: 10px;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    background: red;
    color: white;
    border-radius: 5px;
}
</style>

<div class="filters">
    <button onclick="filterMovies('all')">All</button>
    <button onclick="filterMovies('movie')">Movies</button>
    <button onclick="filterMovies('series')">Series</button>
    <button onclick="filterMovies('anime')">Anime</button>
</div>

<script>
// البحث
document.querySelector(".search").addEventListener("input", function(e) {
    const value = e.target.value.toLowerCase();
    const filtered = movies.filter(m =>
        m.title.toLowerCase().includes(value)
    );
    displayMovies(filtered);
});

// الفلترة
function filterMovies(type) {
    if (type === "all") {
        displayMovies(movies);
    } else {
        const filtered = movies.filter(m => m.category === type);
        displayMovies(filtered);
    }
}
</script>
<script>
// ===== FAVORITES =====
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

function toggleFav(title) {
    if (favorites.includes(title)) {
        favorites = favorites.filter(f => f !== title);
    } else {
        favorites.push(title);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    alert("Updated Favorites ❤️");
}

// ===== RATING SYSTEM =====
function rateMovie(name) {
    let rate = prompt("Rate from 1 to 5 ⭐");
    if (rate >= 1 && rate <= 5) {
        alert(name + " rated " + rate + "⭐");
    }
}

// تعديل العرض لإضافة أزرار
function displayMovies(list) {
    container.innerHTML = "";
    list.forEach(movie => {
        container.innerHTML += `
            <div class="card">
                <img src="${movie.image}" onclick="openPlayer('${movie.video}')">
                <h3>${movie.title}</h3>
                
                <button onclick="toggleFav('${movie.title}')">❤️</button>
                <button onclick="rateMovie('${movie.title}')">⭐</button>
            </div>
        `;
    });
}

// ===== DARK MODE =====
let dark = true;

function toggleMode() {
    if (dark) {
        document.body.style.background = "#fff";
        document.body.style.color = "#000";
        dark = false;
    } else {
        document.body.style.background = "#0f0f0f";
        document.body.style.color = "#fff";
        dark = true;
    }
}
</script>

<button onclick="toggleMode()" style="
position:fixed;
bottom:20px;
right:20px;
padding:10px;
border:none;
background:red;
color:white;
border-radius:50%;
cursor:pointer;
">
🌙
</button>

</body>
</html>
