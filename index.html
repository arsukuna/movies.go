<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>اختبار الموقع</title>
  <style>
    body {
      background:#0b0b0f;
      color:#fff;
      font-family: Arial, sans-serif;
      padding:20px;
    }
    h1 {
      color:#e50914;
      margin-bottom:20px;
    }
    p {
      margin-bottom:15px;
      line-height:1.6;
    }
    .box {
      background:rgba(255,255,255,0.1);
      padding:20px;
      border-radius:8px;
      margin-bottom:20px;
    }
  </style>
</head>
<body>

  <h1>مرحبا رُمين</h1>
  <p>هذا نص تجريبي للتأكد أن الموقع يعمل بشكل صحيح.</p>

  <div class="box">
    <h2>قسم الأنمي</h2>
    <p>هنا سيكون محتوى الأنمي لاحقًا. الآن نعرض نص فقط بدون صور.</p>
  </div>

  <div class="box">
    <h2>قسم الأفلام</h2>
    <p>هنا سيكون محتوى الأفلام لاحقًا. الآن نعرض نص فقط.</p>
  </div>

</body>
</html>
